version: "3.9"

services:
  lakefs-db:
    image: postgres:17
    container_name: lakefs-db
    environment:
      POSTGRES_USER: ${LAKEFS_DB_USER}
      POSTGRES_PASSWORD: ${LAKEFS_DB_PASSWORD}
      POSTGRES_DB: ${LAKEFS_DB_NAME}
    volumes:
      - lakefs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKEFS_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lakefs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  lakefs:
    image: treeverse/lakefs:1.48
    container_name: lakefs
    depends_on:
      lakefs-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - LAKEFS_DATABASE_TYPE=postgres
      - LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING=postgres://${LAKEFS_DB_USER}:${LAKEFS_DB_PASSWORD}@lakefs-db:5432/${LAKEFS_DB_NAME}?sslmode=disable
      - LAKEFS_BLOCKSTORE_TYPE=s3
      - LAKEFS_BLOCKSTORE_S3_ENDPOINT=http://minio:9000
      - LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE=true
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=${LAKEFS_ENCRYPT_KEY}

volumes:
  lakefs_db_data:
  minio_data: